name: Build & deploy to GitHub Pages

# Builds the Vite app in CI and publishes the built site into the
# artfred16.github.io repo, which serves it at https://artfred16.github.io/.
# Replaces the old manual `npm run build` + rsync + commit flow.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build   # -> dist/

      - name: Publish built site to artfred16.github.io
        env:
          DEPLOY_KEY: ${{ secrets.PAGES_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes"

          git clone --depth 1 git@github.com:artfred16/artfred16.github.io.git out

          # Replace site content with the fresh build, but KEEP the Pages repo's
          # .git and .github (its static.yml is what deploys to Pages). This also
          # clears any stale content-hashed bundles from previous deploys.
          find out -mindepth 1 -maxdepth 1 ! -name .git ! -name .github -exec rm -rf {} +
          cp -R dist/. out/

          cd out
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "Deploy ArtfredPortfolio@${GITHUB_SHA::7}"
            git push origin HEAD:main
          fi
